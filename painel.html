<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filosofia Interativa — Painel</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="card">
    <h1>Painel do Aluno</h1>
    <p id="boasVindas" class="sub">Carregando...</p>

    <section class="game-card">
      <h2>🌊 Heráclito — Logos e Movimento</h2>
      <p>Atividade gamificada sobre movimento, mudança, unidade dos opostos e logos.</p>
      <div id="resultadoHeraclito" class="meta">Verificando tentativa...</div>
      <div class="row">
        <a id="jogarHeraclito" class="btn" href="jogos/heraclito/index.html" style="display:none">Jogar</a>
        <button id="sairBtn" class="secondary">Sair</button>
      </div>
    </section>
  </main>

  <script type="module">
    import { observarUsuario, sair, buscarResultadoHeraclito } from "./js/firebase-service.js";

    const boasVindas = document.getElementById("boasVindas");
    const resultadoBox = document.getElementById("resultadoHeraclito");
    const jogarBtn = document.getElementById("jogarHeraclito");
    const sairBtn = document.getElementById("sairBtn");

    observarUsuario(async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      boasVindas.textContent = `Olá, ${user.displayName || "aluno"}.`;

      try {
        const resultado = await buscarResultadoHeraclito(user.uid);

        if (resultado) {
          resultadoBox.innerHTML = `Atividade já realizada.<br>Pontuação: <strong>${resultado.pontuacao}</strong> | Acertos: <strong>${resultado.acertos}</strong> | Erros: <strong>${resultado.erros}</strong>`;
          jogarBtn.style.display = "none";
        } else {
          resultadoBox.textContent = "Atividade disponível. Você terá apenas uma tentativa registrada.";
          jogarBtn.style.display = "inline-block";
        }
      } catch (erro) {
        console.error(erro);
        resultadoBox.textContent = "Erro ao verificar resultado. Confira as regras do Firestore.";
      }
    });

    sairBtn.addEventListener("click", async () => {
      await sair();
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
